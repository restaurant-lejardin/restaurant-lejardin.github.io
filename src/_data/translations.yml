    title: "关于餐厅"
    subtitle: "传统与热情"
    directions_title: "路线指引"
    directions_subtitle: "如何到达"
    directions_from_republique_title: "从共和国广场出发的路线"
    directions_from_republique_desc: "餐厅位于共和国广场（Place de la République）地铁站Temple街出口，对面是Camaïeu商店。您将在BNP和法兴银行之间找到我们，位于Meslay街起始处，紧邻Buffalo Grill后门。"
    metro_station: "共和国广场地铁站"
    bus_station: "共和国广场公交及夜行客运站"
    history_title: "我们的历史"
    history_paragraph1: "我们的家庭餐厅自1975年开业，坐落于一间20世纪初的法式台球厅内。原有的天花板和镜子与1930年代上海风格的装饰相得益彰，在正宗美食中带来传统餐厅的温馨感。我们在此烹制中国美食已有48年，泰国美食已有30年。我们可以根据口味和饮食需求调整菜肴。我们的菜肴均为<b>自制</b>。"
    history_paragraph2: "餐厅理想地坐落于BNP与法兴银行之间，靠近共和国广场，适合各类聚会——商务餐、朋友聚会或家庭聚餐。整体氛围既热情友好，又不失低调雅致。"
    site_notice: "本网站旨在展示餐厅的专业水准，属非商业用途。该网站作为个人技术作品集的一部分开发。"
