    title: "A PROPOS DU RESTAURANT"
    subtitle: "Tradition & Passion"
    directions_title: "DIRECTIONS"
    directions_subtitle: "Comment venir"
    directions_from_republique_title: "Directions depuis République"
    directions_from_republique_desc: "Situé en face du magasin Camaïeu, en sortant du Métro sur la Place de la République, vous nous trouverez en prenant la sortie Rue du Temple. Vous nous verrez entre la BNP et la Société Générale, au début de la Rue Meslay à côté de la porte arrière du Buffalo grill."
    metro_station: "Métro Station République"
    bus_station: "Bus et Noctilien Station République"
    history_title: "Notre histoire"
    history_paragraph1: "Notre restaurant familial est ouvert depuis 1975 dans une ancienne salle de billard français du début du XX<sup>e</sup> siècle. Le plafond et les miroirs d'origine se marient avec le décor du Shanghai des années 1930, apportant le réconfort d'un restaurant traditionnel à la cuisine authentique. Nous cuisinons sur place la gastronomie chinoise depuis 48 ans et la gastronomie thaï depuis 30 ans. Nous pouvons adapter les plats selon les goûts et les restrictions alimentaires sur demande. Nos plat sont <b>faits maison</b>."
    history_paragraph2: "Idéalement situé entre la BNP et la Société Générale tout près de la place de la République, le restaurant est accueillant pour tout public, pour vos repas d'affaires, rendez-vous entre amis et repas en famille. On peut ressentir à la fois la convivialité et la discrétion dans l'ambiance générale."
    site_notice: "Ce website permet de présenter le savoir-faire du restaurant et a un but non commercial. Le site a été développé dans le cadre d'un portfolio personnel de compétences techniques."
