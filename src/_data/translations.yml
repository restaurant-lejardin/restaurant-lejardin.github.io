    directions_title: "DIRECTIONS"
    directions_subtitle: "How to get here"
    directions_from_republique_title: "Directions from République"
    directions_from_republique_desc: "Located opposite the Camaïeu store, when leaving the Metro at Place de la République, you will find us by taking the Rue du Temple exit. We are between BNP and Société Générale, at the start of Rue Meslay next to the back door of Buffalo Grill."
    metro_station: "Metro Station République"
    bus_station: "Bus and Noctilien Station République"
    history_title: "Our History"
    history_paragraph1: "Our family restaurant has been open since 1975 in a former French billiard hall from the early 20th century. The original ceiling and mirrors blend with the 1930s Shanghai decor, bringing the comfort of a traditional restaurant to authentic cuisine. We have been cooking Chinese cuisine on site for 48 years and Thai cuisine for 30 years. We can adapt dishes to tastes and dietary restrictions on request. Our dishes are <b>homemade</b>."
    history_paragraph2: "Ideally located between BNP and Société Générale near Place de la République, the restaurant is welcoming for everyone, for business meals, meetings with friends, and family meals. You can feel both conviviality and discretion in the general atmosphere."
    site_notice: "This website presents the restaurant's know-how and is non-commercial. The site was developed as part of a personal technical portfolio."
